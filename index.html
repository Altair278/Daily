<title>Suivi estival — MPCI L1 → L2</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#050709">
<style>
  :root {
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b6b6b;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f3;
    --color-border-tertiary: rgba(0,0,0,0.10);
    --color-border-secondary: rgba(0,0,0,0.18);
    --color-border-primary: rgba(0,0,0,0.30);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #a0a0a0;
      --color-background-primary: #1c1c1e;
      --color-background-secondary: #2c2c2e;
      --color-border-tertiary: rgba(255,255,255,0.10);
      --color-border-secondary: rgba(255,255,255,0.18);
      --color-border-primary: rgba(255,255,255,0.30);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);min-height:100vh}
  .app{padding:1.5rem 1rem 4rem;max-width:680px;margin:0 auto}
  .app h1{font-size:19px;font-weight:500;color:var(--color-text-primary)}
  .sub{font-size:13px;color:var(--color-text-secondary);margin:4px 0 1.5rem}
  .sgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
  .sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 8px;text-align:center}
  .sv{font-size:20px;font-weight:500;color:var(--color-text-primary)}
  .sl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
  .dnav{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .dnav button{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 12px;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
  .dnav button:hover{background:var(--color-background-secondary)}
  .ddisp{font-size:15px;font-weight:500;flex:1;text-align:center;color:var(--color-text-primary)}
  .badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:1rem;font-weight:500}
  .pwrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1.2rem}
  .prow{display:flex;justify-content:space-between;margin-bottom:8px}
  .prow span{font-size:13px;color:var(--color-text-secondary)}
  .prow strong{font-size:13px;color:var(--color-text-primary);font-weight:500}
  .bar{height:8px;background:var(--color-background-primary);border-radius:4px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
  .fill{height:100%;border-radius:4px;transition:width 0.35s}
  .stitle{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:1.2rem 0 6px}
  .task{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;user-select:none}
  .task:last-of-type{border-bottom:none}
  .ck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .ck.on{background:#1D9E75;border-color:#1D9E75}
  .ck.on::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}
  .tb{flex:1}
  .tt{font-size:14px;color:var(--color-text-primary);line-height:1.4}
  .done .tt{text-decoration:line-through;color:var(--color-text-secondary)}
  .ts2{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
  .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-left:6px;font-weight:500}
  .tm{background:#E6F1FB;color:#0C447C}.tp{background:#FAECE7;color:#993C1D}
  .tc{background:#E1F5EE;color:#085041}.tl{background:#FAEEDA;color:#854F0B}
  .tg{background:#EEEDFE;color:#3C3489}.td{background:#FBEAF0;color:#72243E}
  .tz{background:#FCEBEB;color:#A32D2D}.tr{background:#EAF3DE;color:#27500A}
  .tsc{background:#F1EFE8;color:#444441}.tk{background:#9FE1CB;color:#04342C}.ta{background:#FDE8F5;color:#7B1F5E}
  .dbox{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:12px 14px;background:var(--color-background-primary)}
  .dhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .dlbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em}
  .dots{display:flex;gap:3px}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.on{background:#D85A30}.dot.off{background:var(--color-border-tertiary)}
  .dtxt{font-size:14px;color:var(--color-text-primary);line-height:1.5}
  .dtime{font-size:12px;color:var(--color-text-secondary);margin-left:auto}
  textarea{width:100%;min-height:70px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);resize:vertical}
  textarea:focus{outline:none;border-color:var(--color-border-primary)}
  .sbtn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px;font-size:13px;color:var(--color-text-primary);cursor:pointer;width:100%;margin-top:8px}
  .sbtn:hover{background:var(--color-background-secondary)}
  .rest{text-align:center;padding:2.5rem 1rem;color:var(--color-text-secondary);font-size:15px}
  .srow{display:flex;align-items:center;gap:8px;margin-top:6px}
  .srow input[type=number]{width:70px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 8px;font-size:14px;color:var(--color-text-primary);background:var(--color-background-primary);text-align:center}
  .sstat{font-size:13px;font-weight:500}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 18px;font-size:13px;color:var(--color-text-primary);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99}
  .toast.show{opacity:1}
  /* English exposure progress bar in stats */
  .en-total-bar{height:6px;background:var(--color-background-primary);border-radius:3px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);margin-top:4px}
  .en-total-fill{height:100%;border-radius:3px;background:#EF9F27;transition:width 0.35s}
  .sv-small{font-size:14px;font-weight:500;color:var(--color-text-primary)}
</style>
</head>
<body>
<div class="app">
  <h1>Suivi estival — MPCI L1 → L2</h1>
  <p class="sub">Préparation grande école · Été 2026</p>
  <div class="sgrid">
    <div class="sc"><div class="sv" id="s0">— ★</div><div class="sl">Streak</div></div>
    <div class="sc"><div class="sv" id="s1">—</div><div class="sl">Complétion</div></div>

      <div class="sv-small" id="s4">— h</div>
      <div class="en-total-bar"><div class="en-total-fill" id="s4bar" style="width:0%"></div></div>
      <div class="sl">Anglais cumulé</div>
    </div>
  </div>
  <div class="dnav">
    <button onclick="shift(-1)">&#8592;</button>
    <div class="ddisp" id="dd"></div>
    <button onclick="shift(1)">&#8594;</button>
  </div>
  <div id="phb"></div>
  <div id="prg"></div>
  <div id="bdy"></div>
  <div class="toast" id="toast"></div>
</div>
<script>
const J=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const M=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const SEUIL=60;
// English exposure goal: 200 hours over the summer (indicative)
const EN_GOAL_H = 200;

const SPORT={
  1:{type:"Musculation + grip — haut du corps",detail:"Pompes 4×max · Tractions 4×max · Dips 4×max · Farmer carry 3×30 sec · Repos 90 sec",dur:45},
  2:{type:"Boxe solo — session intense",detail:"3 rounds shadow (technique, placement) · 4-5 rounds sac (combinaisons) · 1 round corde à sauter",dur:40},
  3:{type:"Musculation + grip — bas du corps",detail:"Squats 4×12 · Fentes 3×10/jambe · Mollets 4×20 · Farmer carry 3×30 sec · Repos 90 sec",dur:45},
  4:{type:"Boxe solo — session intense",detail:"3 rounds shadow (technique, placement) · 4-5 rounds sac (combinaisons) · 1 round corde à sauter",dur:40},
  5:{type:"Musculation + grip — full body",detail:"Pompes 4×max · Squats 4×12 · Tractions 3×max · Farmer carry 3×30 sec · Gainage 3×60 sec",dur:45},
  6:{type:"Boxe légère ou repos actif",detail:"2-3 rounds shadow détendu · Étirements · ou marche rapide 30 min si fatigue",dur:30},
};

const DEFIS=[
  {t:"Explique à voix haute, sans notes, un théorème vu cette semaine. Enregistre-toi et réécoute.",d:1,m:20},
  {t:"Résous un LeetCode Medium sans regarder les indices pendant les 30 premières minutes.",d:3,m:30},
  {t:"Lis un article académique en anglais lié à ta leçon et fais un résumé en 5 lignes.",d:2,m:30},
  {t:"Essaie de résoudre un exercice de concours Polytechnique ou Centrale sur ta matière du jour.",d:3,m:60},
  {t:"Rédige une fiche d'une page sur la diagonalisation comme si tu l'expliquais à un lycéen.",d:1,m:30},
  {t:"Résous un problème de physique en appliquant le formalisme lagrangien.",d:2,m:40},
  {t:"Traduis tes notes de cours du jour en anglais, aussi fidèlement que possible.",d:1,m:25},
  {t:"Résous un exercice en Python ET décris l'algorithme en pseudo-code mathématique.",d:2,m:45},
  {t:"Fais une séance de révision à voix haute dans une pièce vide — parle comme en amphi.",d:2,m:30},
  {t:"Écris la démonstration d'un résultat du cours de tête, sans ouvrir aucun document.",d:2,m:25},
  {t:"Reprends un exercice raté récemment et refais-le de zéro sans regarder la correction.",d:2,m:40},
  {t:"Écris 10 questions de colle sur ta leçon du jour, comme si tu étais le prof.",d:1,m:20},
  {t:"Fais un arbre de dépendances logiques entre les 5 derniers théorèmes vus — sur papier.",d:3,m:35},
  {t:"Résous un problème de maths uniquement en anglais — énoncé EN, rédaction EN.",d:2,m:40},
  {t:"Envoie un message à un étudiant L2 pour demander un retour sur les cours S3.",d:2,m:15},
  {t:"Appelle un professeur ou tuteur pour lui poser une question que tu hésitais à poser.",d:3,m:20},
  {t:"Contacte le bureau des étudiants d'une grande école (X, CS, Mines) pour un témoignage.",d:3,m:15},
  {t:"Explique à un proche ce que tu travailles cet été — simplement, sans jargon.",d:1,m:15},
  {t:"Écris un README GitHub décrivant ce que tu construis cet été.",d:2,m:30},
  {t:"Demande à quelqu'un de te poser des questions sur un cours — joue le jeu comme en colle.",d:2,m:20},
  {t:"Envoie un email à un chercheur pour lui poser une question sur ses travaux.",d:3,m:20},
  {t:"Propose à quelqu'un de t'écouter expliquer un sujet technique pendant 10 min.",d:2,m:15},
  {t:"Ne touche pas ton téléphone avant 10h — matinée zéro distraction, zéro réseaux.",d:2,m:0},
  {t:"Lève-toi 1h plus tôt que d'habitude et commence à travailler sans regarder ton téléphone.",d:3,m:0},
  {t:"Passe toute la journée sans musique de fond — silence total pendant les sessions.",d:2,m:0},
  {t:"Passe 1h sans écran après midi — lecture papier uniquement.",d:1,m:60},
  {t:"Médite 20 min sans te lever ni regarder ton téléphone.",d:2,m:20},
  {t:"Pose-toi 3 questions difficiles sur tes objectifs grandes écoles et écris tes réponses honnêtes.",d:3,m:20},
  {t:"Écris tes 3 plus grandes peurs face aux concours. Puis une action concrète pour chacune.",d:3,m:25},
  {t:"Planifie ta semaine entière la veille au soir et tiens-t'y sans déroger.",d:2,m:15},
  {t:"Coupe toutes les notifications 6 heures et travaille en mode avion.",d:2,m:0},
  {t:"Fais une revue hebdomadaire écrite : bien, mal, ce que tu corriges.",d:1,m:20},
  {t:"Travaille 90 min d'affilée sans interruption — aucune pause avant la fin.",d:2,m:90},
  {t:"Dors avant 23h ce soir. Éteins tout. Prépare demain avant de te coucher.",d:2,m:0},
  {t:"Rédige un plan détaillé de ta lettre de motivation grande école.",d:2,m:40},
  {t:"Liste 10 choses concrètes qui te distinguent d'un candidat lambda au concours GEI.",d:2,m:20},
  {t:"Écris une première version brute de ta lettre de motivation sans chercher à la perfectionner.",d:3,m:45},
  {t:"Cherche 3 témoignages d'anciens MPCI admis en grande école et note ce qui revient.",d:2,m:30},
  {t:"Mets à jour ton CV aujourd'hui — ajoute toute activité récente, même petite.",d:1,m:20},
  {t:"Recherche les dates et modalités du concours GEI-Univ et construis un rétro-planning.",d:2,m:30},
  {t:"Identifie 3 faiblesses de ton dossier et écris une stratégie concrète pour chacune.",d:3,m:25},
  {t:"Calcule ton budget cet été : dépenses, entrées, objectifs d'épargne.",d:1,m:20},
  {t:"Lis un article sur un concept éco (inflation, taux directeur…) et explique en 3 phrases.",d:1,m:20},
  {t:"Écoute un épisode de podcast anglophone (science, tech, économie). Retiens 3 idées.",d:1,m:30},
  {t:"Réfléchis à une compétence monétisable pendant tes études et rédige un mini-plan.",d:2,m:25},
  {t:"Regarde une conférence TED en anglais hors de tes habitudes. Note 3 idées.",d:1,m:20},
  {t:"Passe une session de travail entière en anglais — onglets EN, notes EN.",d:2,m:120},
  {t:"Écoute les news BBC World Service 20 min et résume ce que tu as compris.",d:1,m:20},
  {t:"Trouve un subreddit scientifique (r/math, r/physics) et lis 10 posts. Note ce qui t'a surpris.",d:1,m:20},
  {t:"Dessine de mémoire un schéma complet d'un système physique vu cette semaine.",d:2,m:20},
  {t:"Invente un problème original à partir d'un concept vu en cours. Essaie de le résoudre.",d:3,m:30},
  {t:"Écris une analogie entre un concept mathématique abstrait et quelque chose du quotidien.",d:2,m:15},
  {t:"Joue une partie d'échecs en analyse profonde — après chaque coup, écris pourquoi.",d:1,m:30},
  {t:"Résous un problème de logique ou puzzle math (Project Euler) que tu n'as jamais vu.",d:2,m:30},
  {t:"Écris la biographie en 10 lignes d'un mathématicien que tu admires.",d:1,m:20},
  {t:"Envoie un message à quelqu'un que tu n'as pas contacté depuis 3 mois.",d:1,m:10},
  {t:"Fais quelque chose que tu reportes depuis plus d'une semaine — maintenant, en 25 min max.",d:2,m:25},
  {t:"Identifie une mauvaise habitude actuelle et écris un plan concret pour l'éliminer.",d:2,m:15},
  {t:"Fais un entraînement physique différent de celui prévu — cours 30 min si tu fais la salle.",d:2,m:30},
  {t:"Écris ce que tu veux accomplir dans 5 ans — sans te censurer, sans être raisonnable.",d:2,m:20},
  {t:"Apprends par cœur une formule que tu as toujours cherchée dans tes notes.",d:1,m:20},
];

const PHASES=[
  {id:'pre',  name:'Pré-été — actions immédiates',start:'2026-06-01',end:'2026-07-06',col:'#B5D4F4',tc:'#042C53'},
  {id:'ramp', name:'Phase 1 — Ramp-up léger',    start:'2026-07-01',end:'2026-07-07',col:'#9FE1CB',tc:'#04342C'},
  {id:'main', name:'Phase 2 — Bloc matin sérieux',start:'2026-07-08',end:'2026-08-12',col:'#F5C4B3',tc:'#993C1D'},
  {id:'disco',name:'Phase 3 — Déconnexion totale',start:'2026-08-13',end:'2026-08-25',col:'#D3D1C7',tc:'#2C2C2A'},
  {id:'reprise',name:'Phase 4 — Reprise rentrée', start:'2026-08-26',end:'2026-09-20',col:'#C0DD97',tc:'#173404'},
];

function dk(d){return d.toISOString().slice(0,10);}
function getPhase(d){const k=dk(d);for(let i=PHASES.length-1;i>=0;i--)if(k>=PHASES[i].start&&k<=PHASES[i].end)return PHASES[i];return null;}
function getSeed(d){return parseInt(dk(d).replace(/-/g,''))%9973;}

// Today's real date (for stats calculation)
function todayKey(){
  const n=new Date();n.setHours(12,0,0,0);return dk(n);
}

function getDayInfo(d){
  const dow=d.getDay();if(dow===0)return null;
  const ph=getPhase(d);if(!ph)return null;
  const s=getSeed(d);
  const defi=DEFIS[s%DEFIS.length];
  const sport=SPORT[dow]||SPORT[6];
  const inStretchPeriod=dk(d)>='2026-06-01'&&dk(d)<'2026-09-01';

  const common=[
    {id:'sport',title:'Sport : '+sport.type,sub:sport.detail+' · ~'+sport.dur+' min',tag:'tk'},
    {id:'pompes',title:'60 pompes',sub:'En une ou plusieurs séries — à faire avant midi',tag:'tk'},
    ...(inStretchPeriod?[{id:'stretch',title:'Assouplissement (10–15 min)',sub:'Stretching complet : hanches, dos, ischio-jambiers, épaules',tag:'ta'}]:[]),
    // Lecture libre — pas de titre imposé
    {id:'anki',title:'Anki',sub:'Toutes les cartes du jour — ne pas sauter, même 5 min suffisent',tag:'tm'},
    {id:'lecture',title:'Lecture (30 min min)',sub:'Livre de ton choix — note ce que tu as lu dans les remarques',tag:'tr'},
    {id:'screen',title:'Temps d\'écran loisirs < '+SEUIL+' min',sub:'Travail et sport non comptés',tag:'tsc',isScreen:true},
    // English exposure tracker
    {id:'english',title:'Exposition anglais du jour',sub:'Podcasts, vidéos, lectures, séries EN… tout compte',tag:'tl',isEnglish:true},
  ];

  if(ph.id==='pre')return{ph,defi,tasks:[
    {id:'gh',title:'Créer le compte GitHub',tag:'tg'},
    {id:'ielts-info',title:'Se renseigner sur le format IELTS',sub:'Academic vs General Training — objectif band 7.5+',tag:'tl'},
    {id:'s3-syl',title:'Obtenir les syllabus S3 auprès d\'étudiants L2',tag:'td'},
    {id:'tutorat',title:'Chercher une opportunité de tutorat',sub:'Valorisation dossier grande école',tag:'td'},
    ...common]};

  if(ph.id==='ramp')return{ph,defi,tasks:[
    {id:'m30',title:'30 min de maths',sub:'Révision S1/S2 — algèbre ou analyse',tag:'tm'},
    {id:'lc-e',title:'1 exercice LeetCode Easy',tag:'tc'},
    ...common]};

  if(ph.id==='main'){
    if(dow===6)return{ph:{...ph,name:'Phase 2 — Samedi'},defi,tasks:[
      {id:'gh-proj',title:'Session projet GitHub (2h)',sub:'Simulateur Python + couche ML',tag:'tg'},
      {id:'en-bilan',title:'Bilan hebdo anglais',sub:'Compte tes heures de la semaine · vise 7h+ en immersion',tag:'tl'},
      {id:'m-rev',title:'Révision maths de la semaine',tag:'tm'},
      ...common]};
    const mh=dow===1||dow===3||dow===5;
    return{ph,defi,tasks:[
      mh?{id:'m-bloc',title:'Bloc Mathématiques (2h)',sub:'Diagonalisation & réduction d\'endomorphismes',tag:'tm'}:{id:'m-bloc',title:'Maths (1h)',sub:'Exercices d\'application et consolidation',tag:'tm'},
      !mh?{id:'p-bloc',title:'Bloc Physique (1h30)',sub:'Électrocinétique & circuits · Algèbre linéaire',tag:'tp'}:{id:'p-bloc',title:'Physique (45 min)',sub:'Relecture & questions de cours',tag:'tp'},
      {id:'lc-45',title:'45 min LeetCode',sub:d<new Date('2026-07-25')?'Niveau Easy':'Niveau Medium',tag:'tc'},
      {id:'avant-midi',title:'Tout terminé avant midi ✓',sub:'Rythme 8h → 12h respecté',tag:'td'},
      ...common]};}

  if(ph.id==='disco')return{ph,defi:null,tasks:[]};

  return{ph,defi,tasks:[
    {id:'rv-m',title:'Synthèse maths S3',sub:'Diagonalisation, formes bilinéaires, topologie',tag:'tm'},
    {id:'rv-p',title:'Synthèse physique S3',sub:'Électrocinétique, circuits, algèbre linéaire avancée',tag:'tp'},
    {id:'cv-f',title:'Finaliser CV et lettre de motivation',sub:'Sport + tutorat + GitHub',tag:'td'},
    {id:'ielts-book',title:'Réserver session IELTS officielle',sub:'British Council ou IDP — Academic',tag:'tl'},
    ...common]};
}

const STATE={};
let cur=new Date();cur.setHours(12,0,0,0);

function getState(k){return STATE[k]||(STATE[k]={tasks:{},notes:'',errors:'',screen:null,english:null});}

function persistLoad(k){
  if(STATE[k])return;
  try{const raw=localStorage.getItem('mpci7:'+k);if(raw)STATE[k]=JSON.parse(raw);}catch(e){}
  if(!STATE[k])STATE[k]={tasks:{},notes:'',errors:'',screen:null,english:null};
}
function persist(k){
  try{localStorage.setItem('mpci7:'+k,JSON.stringify(STATE[k]));}catch(e){}
}

function shift(delta){cur.setDate(cur.getDate()+delta);render();}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function toggleTask(id){
  const k=dk(cur);persistLoad(k);
  const st=getState(k);
  st.tasks[id]=!st.tasks[id];
  persist(k);render();
  toast(st.tasks[id]?'Validé ✓':'Décoché');
}

function saveNotes(){
  const k=dk(cur);persistLoad(k);
  getState(k).notes=document.getElementById('ni').value;
  persist(k);toast('Notes sauvegardées');
}

function saveErrors(){
  const k=dk(cur);persistLoad(k);
  getState(k).errors=document.getElementById('ei').value;
  persist(k);toast('Erreurs sauvegardées');
}

function saveScreen(){
  const k=dk(cur);persistLoad(k);
  const val=parseInt(document.getElementById('scr').value)||0;
  const st=getState(k);
  st.screen=val;st.tasks['screen']=val<=SEUIL;
  persist(k);render();
}

function saveEnglish(){
  const k=dk(cur);persistLoad(k);
  const val=parseFloat(document.getElementById('enhr').value)||0;
  const st=getState(k);
  st.english=val;
  // Mark as done if at least 30 min of English
  st.tasks['english']=val>=0.5;
  persist(k);render();
}

function computeStats(){
  const today=todayKey();
  let tT=0,dT=0,dD=0,sp=0,streak=0,enTotalMin=0;

  // Load all keys that are <= today (fix: ignore future days in stats)
  const allKeys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('mpci7:')){
      const dateKey=k.replace('mpci7:','');
      if(dateKey<=today)allKeys.push(dateKey);
    }
  }
  // Also include any keys already loaded in STATE that are <= today
  for(const k of Object.keys(STATE)){
    if(k<=today&&!allKeys.includes(k))allKeys.push(k);
  }
  allKeys.sort().reverse();

  for(const k of allKeys){
    persistLoad(k);
    const d2=new Date(k+'T12:00:00');
    const info=getDayInfo(d2);
    if(!info||info.tasks.length===0)continue;
    const st=STATE[k];if(!st)continue;
    const tot=info.tasks.length+1;
    const done=info.tasks.filter(t=>st.tasks&&st.tasks[t.id]).length+(st.tasks&&st.tasks.defi?1:0);
    tT+=tot;dT+=done;if(done===tot)dD++;if(st.tasks&&st.tasks.sport)sp++;
    // Sum English hours
    if(st.english)enTotalMin+=st.english*60;
  }

  // Streak: consecutive completed days going back from today
  for(const k of allKeys){
    persistLoad(k);
    const d2=new Date(k+'T12:00:00');
    const info=getDayInfo(d2);
    if(!info||info.tasks.length===0)continue;
    const st=STATE[k];if(!st)break;
    const tot=info.tasks.length+1;
    const done=info.tasks.filter(t=>st.tasks&&st.tasks[t.id]).length+(st.tasks&&st.tasks.defi?1:0);
    if(done===tot)streak++;else break;
  }

  document.getElementById('s0').textContent=streak+' ★';
  document.getElementById('s1').textContent=tT>0?Math.round(dT/tT*100)+'%':'0%';
  document.getElementById('s2').textContent=dD;

  // English cumulated hours
  const enH=(enTotalMin/60).toFixed(1);
  document.getElementById('s4').textContent=enH+' h';
  const enPct=Math.min(100,Math.round((enTotalMin/60)/EN_GOAL_H*100));
  document.getElementById('s4bar').style.width=enPct+'%';
}

function render(){
  const k=dk(cur);persistLoad(k);
  const st=getState(k);
  const dow=cur.getDay();
  const info=getDayInfo(cur);

  document.getElementById('dd').textContent=J[dow]+' '+cur.getDate()+' '+M[cur.getMonth()]+' '+cur.getFullYear();

  if(dow===0){
    document.getElementById('phb').innerHTML='<span class="badge" style="background:#D3D1C7;color:#2C2C2A">Dimanche — repos complet</span>';
    document.getElementById('prg').innerHTML='';
    document.getElementById('bdy').innerHTML='<div class="rest">🌿 Repos complet. Pas de sport, pas de travail.</div>';
    computeStats();return;
  }
  if(!info){
    document.getElementById('phb').innerHTML='<span class="badge" style="background:#F1EFE8;color:#5F5E5A">Hors planning</span>';
    document.getElementById('prg').innerHTML='';
    document.getElementById('bdy').innerHTML='<div class="rest">Navigue vers l\'été 2026 avec les flèches.</div>';
    computeStats();return;
  }
  const ph=info.ph;
  document.getElementById('phb').innerHTML='<span class="badge" style="background:'+ph.col+';color:'+ph.tc+'">'+ph.name+'</span>';
  if(ph.id==='disco'||info.tasks.length===0){
    document.getElementById('prg').innerHTML='';
    document.getElementById('bdy').innerHTML='<div class="rest">☀️ Déconnexion totale — repos mérité !</div>';
    computeStats();return;
  }

  const tasks=info.tasks;const defi=info.defi;
  const defiDone=!!(st.tasks&&st.tasks.defi);
  const done=tasks.filter(t=>st.tasks&&st.tasks[t.id]).length+(defiDone?1:0);
  const tot=tasks.length+1;
  const pct=Math.round(done/tot*100);
  const fill=pct===100?'#1D9E75':pct>=50?'#EF9F27':'#D85A30';

  document.getElementById('prg').innerHTML='<div class="pwrap"><div class="prow"><span>Progression du jour</span><strong>'+pct+'% — '+done+'/'+tot+'</strong></div><div class="bar"><div class="fill" style="width:'+pct+'%;background:'+fill+'"></div></div></div>';

  const TLBL={tm:'Maths',tp:'Physique',tc:'CS',tl:'Anglais',tg:'Projet',td:'Dossier',tz:'Défi',tr:'Lecture',tsc:'Écran',tk:'Sport',ta:'Assouplissement'};
  let html='<div class="stitle">Tâches du jour</div>';

  tasks.forEach(function(t){
    const ok=!!(st.tasks&&st.tasks[t.id]);

    if(t.isScreen){
      const sv2=st.screen;const ok2=sv2!==null&&sv2<=SEUIL;
      html+='<div class="task'+(ok?' done':'')+'" onclick="toggleTask(\''+t.id+'\')"><div class="ck'+(ok?' on':'')+'"></div><div class="tb"><div class="tt">'+t.title+'<span class="tag tsc">Écran</span></div><div class="ts2">'+t.sub+'</div><div class="srow" onclick="event.stopPropagation()"><input type="number" id="scr" min="0" max="999" placeholder="min" value="'+(sv2!==null?sv2:'')+'" onchange="saveScreen()"><span class="sstat" style="color:'+(sv2===null?'var(--color-text-secondary)':ok2?'#1D9E75':'#D85A30')+'">'+(sv2===null?'Entre tes minutes':'Seuil '+SEUIL+' min · '+(ok2?'✓ Respecté':'✗ Dépassé'))+'</span></div></div></div>';

    } else if(t.isEnglish){
      // English exposure: input in hours (decimal), auto-validate if ≥ 0.5h
      const ev=st.english;const ok2=ev!==null&&ev>=0.5;
      html+='<div class="task'+(ok?' done':'')+'" onclick="toggleTask(\''+t.id+'\')"><div class="ck'+(ok?' on':'')+'"></div><div class="tb"><div class="tt">'+t.title+'<span class="tag tl">Anglais</span></div><div class="ts2">'+t.sub+'</div><div class="srow" onclick="event.stopPropagation()"><input type="number" id="enhr" min="0" max="24" step="0.25" placeholder="heures" value="'+(ev!==null?ev:'')+'" onchange="saveEnglish()"><span class="sstat" style="color:'+(ev===null?'var(--color-text-secondary)':ok2?'#1D9E75':'#EF9F27')+'">'+(ev===null?'Entre tes heures':(ev+'h — '+(ok2?'✓ Validé':'⟳ Continue')))+'</span></div></div></div>';

    } else {
      html+='<div class="task'+(ok?' done':'')+'" onclick="toggleTask(\''+t.id+'\')"><div class="ck'+(ok?' on':'')+'"></div><div class="tb"><div class="tt">'+t.title+'<span class="tag '+t.tag+'">'+(TLBL[t.tag]||'')+'</span></div>'+(t.sub?'<div class="ts2">'+t.sub+'</div>':'')+'</div></div>';
    }
  });

  if(defi){
    const dots=[1,2,3].map(function(i){return'<div class="dot'+(i<=defi.d?' on':' off')+'"></div>';}).join('');
    html+='<div class="stitle" style="margin-top:1.2rem">Défi du jour — zone de confort</div><div class="dbox"><div class="dhead"><div class="dots">'+dots+'</div><span class="dlbl">Difficulté</span>'+(defi.m>0?'<span class="dtime">~'+defi.m+' min</span>':'')+'</div><div class="dtxt">'+defi.t+'</div></div><div class="task'+(defiDone?' done':'')+'" onclick="toggleTask(\'defi\')"><div class="ck'+(defiDone?' on':'')+'"></div><div class="tb"><div class="tt">Défi relevé<span class="tag tz">Défi</span></div></div></div>';
  }

  html+='<div class="stitle" style="margin-top:1.2rem">Notes du jour</div><textarea id="ni" placeholder="Ce que tu as appris, compris, retenu…">'+(st.notes||'').replace(/</g,'&lt;')+'</textarea><button class="sbtn" onclick="saveNotes()">Sauvegarder les notes</button>';

  html+='<div class="stitle" style="margin-top:1.2rem;color:#A32D2D">Ce que j\'ai raté — et pourquoi</div><textarea id="ei" placeholder="Exercice raté, concept flou, mauvaise habitude… Sois précis : qu\'est-ce qui a bloqué ?" style="border-color:rgba(163,45,45,0.25);min-height:60px">'+(st.errors||'').replace(/</g,'&lt;')+'</textarea><button class="sbtn" onclick="saveErrors()" style="border-color:rgba(163,45,45,0.25);color:#A32D2D">Sauvegarder</button>';

  document.getElementById('bdy').innerHTML=html;
  computeStats();
}

render();
</script>
</body>
</html>
